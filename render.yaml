services:
  - type: web
    name: schoolmis-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: ENABLE_AUTO_MIGRATE
        value: true
      - key: SINGLE_DB
        value: true
      - key: DB_SSL
        value: true
